<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" fill="none">
  <style>
    .heading { font-family: Georgia, 'Times New Roman', serif; }
    .body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .anim-1 { animation: slideUp 0.6s ease-out 0.2s both; }
    .anim-2 { animation: slideUp 0.6s ease-out 0.5s both; }
    .anim-3 { animation: slideUp 0.6s ease-out 0.8s both; }
    .anim-4 { animation: slideUp 0.6s ease-out 1.1s both; }
    .anim-5 { animation: slideUp 0.6s ease-out 1.4s both; }
    .live-dot { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Email client frame -->
  <rect width="480" height="520" rx="12" fill="#F7F5F0"/>
  <rect width="480" height="520" rx="12" stroke="#D4CFC4" stroke-width="1"/>

  <!-- Top bar -->
  <rect y="0" width="480" height="44" rx="12" fill="#0A1628"/>
  <rect y="12" width="480" height="32" fill="#0A1628"/>
  <!-- Window dots -->
  <circle cx="20" cy="22" r="5" fill="#E74C3C" opacity="0.8"/>
  <circle cx="36" cy="22" r="5" fill="#F1C40F" opacity="0.8"/>
  <circle cx="52" cy="22" r="5" fill="#2ECC71" opacity="0.8"/>
  <!-- Subject line -->
  <text x="240" y="26" text-anchor="middle" class="body" fill="#C9A84C" font-size="12" font-weight="600">MBA Hiring Intel — Week of Apr 28</text>

  <!-- Header area -->
  <rect x="0" y="44" width="480" height="60" fill="#0A1628"/>
  <text x="240" y="70" text-anchor="middle" class="heading" fill="#FFFFFF" font-size="16" font-weight="700" letter-spacing="1.5">MBA GUIDANCE</text>
  <rect x="160" y="80" width="160" height="2" fill="#C9A84C"/>
  <text x="240" y="96" text-anchor="middle" class="body" fill="#C9A84C" font-size="10" font-weight="600" letter-spacing="1">WEEKLY BRIEFING</text>

  <!-- Content area -->
  <!-- Section 1: Who's Hiring -->
  <g class="anim-1">
    <text x="32" y="134" class="heading" fill="#0A1628" font-size="15" font-weight="700">Who's Hiring This Week</text>
    <rect x="32" y="140" width="80" height="2" fill="#C9A84C"/>

    <!-- Company rows -->
    <g class="body" font-size="12">
      <rect x="32" y="152" width="416" height="28" rx="4" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="0.5"/>
      <text x="44" y="170" fill="#0A1628" font-weight="600">McKinsey &amp; Co.</text>
      <text x="200" y="170" fill="#6B7280">Associate — 14 openings</text>
      <rect x="380" y="160" width="56" height="18" rx="9" fill="#0A1628"/>
      <text x="408" y="173" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">$198K</text>

      <rect x="32" y="184" width="416" height="28" rx="4" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="0.5"/>
      <text x="44" y="202" fill="#0A1628" font-weight="600">Amazon</text>
      <text x="200" y="202" fill="#6B7280">Sr. PM — 8 openings</text>
      <rect x="380" y="192" width="56" height="18" rx="9" fill="#0A1628"/>
      <text x="408" y="205" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">$185K</text>

      <rect x="32" y="216" width="416" height="28" rx="4" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="0.5"/>
      <text x="44" y="234" fill="#0A1628" font-weight="600">Goldman Sachs</text>
      <text x="200" y="234" fill="#6B7280">VP, IB — 6 openings</text>
      <rect x="380" y="224" width="56" height="18" rx="9" fill="#0A1628"/>
      <text x="408" y="237" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">$210K</text>
    </g>
  </g>

  <!-- Section 2: Salary Trends -->
  <g class="anim-3">
    <text x="32" y="278" class="heading" fill="#0A1628" font-size="15" font-weight="700">Salary Trends</text>
    <rect x="32" y="284" width="60" height="2" fill="#C9A84C"/>

    <!-- Mini bar chart -->
    <g transform="translate(32, 296)">
      <rect x="0" y="32" width="56" height="48" rx="3" fill="#C9A84C" opacity="0.3"/>
      <rect x="0" y="48" width="56" height="32" rx="3" fill="#C9A84C"/>
      <text x="28" y="90" text-anchor="middle" class="body" fill="#6B7280" font-size="9">Consulting</text>

      <rect x="72" y="20" width="56" height="60" rx="3" fill="#C9A84C" opacity="0.3"/>
      <rect x="72" y="36" width="56" height="44" rx="3" fill="#C9A84C"/>
      <text x="100" y="90" text-anchor="middle" class="body" fill="#6B7280" font-size="9">Finance</text>

      <rect x="144" y="40" width="56" height="40" rx="3" fill="#C9A84C" opacity="0.3"/>
      <rect x="144" y="52" width="56" height="28" rx="3" fill="#C9A84C"/>
      <text x="172" y="90" text-anchor="middle" class="body" fill="#6B7280" font-size="9">Tech PM</text>

      <rect x="216" y="48" width="56" height="32" rx="3" fill="#C9A84C" opacity="0.3"/>
      <rect x="216" y="56" width="56" height="24" rx="3" fill="#C9A84C"/>
      <text x="244" y="90" text-anchor="middle" class="body" fill="#6B7280" font-size="9">Marketing</text>

      <!-- Y-axis labels -->
      <text x="300" y="36" class="body" fill="#6B7280" font-size="9">$200K+</text>
      <text x="300" y="56" class="body" fill="#6B7280" font-size="9">$175K</text>
      <text x="300" y="76" class="body" fill="#6B7280" font-size="9">$150K</text>
    </g>
  </g>

  <!-- Section 3: Placement Intel -->
  <g class="anim-4">
    <text x="32" y="420" class="heading" fill="#0A1628" font-size="15" font-weight="700">Placement Intel</text>
    <rect x="32" y="426" width="60" height="2" fill="#C9A84C"/>

    <g class="body" font-size="11.5">
      <circle cx="44" cy="446" r="4" fill="#C9A84C"/>
      <text x="56" y="450" fill="#3D3D3D">Wharton placed 34% into finance (up from 31%)</text>

      <circle cx="44" cy="468" r="4" fill="#C9A84C"/>
      <text x="56" y="472" fill="#3D3D3D">Kellogg consulting placements hit 5-year high</text>

      <circle cx="44" cy="490" r="4" fill="#C9A84C"/>
      <text x="56" y="494" fill="#3D3D3D">HBS tech hiring: Meta, Stripe leading offers</text>
    </g>
  </g>

  <!-- Live indicator -->
  <g class="anim-5">
    <circle cx="436" cy="134" r="4" fill="#2ECC71" class="live-dot"/>
    <text x="424" y="138" text-anchor="end" class="body" fill="#6B7280" font-size="9">LIVE DATA</text>
  </g>
</svg>